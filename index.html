<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АзияАвто-Агрегатор</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <header>
      <h1>🚗 АзияАвто-Агрегатор</h1>
      <p>Сравнение цен на авто под заказ из Китая, Кореи и Японии</p>
    </header>

    <div class="search-box">
      <input type="text" id="carInput" value="Kia Sportage" placeholder="Введите марку и модель...">
      <button id="searchBtn">Найти лучшие цены</button>
    </div>

    <div id="resultsContainer" class="results-grid">
      <p class="placeholder-text">Введите модель и нажмите кнопку для симуляции парсинга...</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
