name: Auto Run Auto-Parser

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# Принудительно включаем Node.js 24 для всех шагов воркфлоу, как просит GitHub
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run parser script
      run: python parser.py

    - name: Commit and push if changed
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Авто-обновление цен импортеров" && git push)
