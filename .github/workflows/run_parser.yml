name: Auto Run Auto-Parser

# Запускаем скрипт каждый день в 3 часа ночи по Гринвичу (или при ручном пуске)
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: # Позволяет запускать парсер вручную кнопкой в интерфейсе GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем файлы репозитория на виртуальную машину
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Включаем Python
    - name: Set up Python
      uses: actions/set-up-python@v4
      with:
        python-version: '3.10'

    # 3. Запускаем наш парсер
    - name: Run parser script
      run: python parser.py

    # 4. Проверяем изменения и автоматически пушим обновленный data.json обратно в репозиторий
    - name: Commit and push if changed
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Авто-обновление цен импортеров" && git push)
